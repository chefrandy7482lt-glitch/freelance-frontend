<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TDU Freelance Portal</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-top: 30px;
        font-size: 28px;
        color: #333;
    }

    .button-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        width: 90%;
        max-width: 600px;
        margin-top: 20px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #0078ff;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #005fcc;
    }

    #job-panel {
        margin-top: 30px;
        width: 90%;
        max-width: 600px;
        background: white;
        padding: 20px;
        border-radius: 10px;
        display: none;
    }

    input, textarea {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    #submit-btn {
        margin-top: 20px;
        background: #28a745;
    }

    #submit-btn:hover {
        background: #1e7e34;
    }

    #download-section {
        margin-top: 20px;
        display: none;
    }
</style>
</head>

<body>

<h1>TDU Freelance Portal</h1>

<div class="button-grid">
    <button onclick="openJob('Email Janitor')">Email Janitor</button>
    <button onclick="openJob('PC Janitor')">PC Janitor</button>
    <button onclick="openJob('File Assistant')">File Assistant</button>
    <button onclick="openJob('Program Builder')">Program Builder</button>
    <button onclick="openJob('Document Builder')">Document Builder</button>
    <button onclick="openJob('Resume Builder')">Resume Builder</button>
    <button onclick="openJob('Website Builder')">Website Builder</button>
    <button onclick="openJob('Data Entry')">Data Entry</button>
    <button onclick="openJob('Photo Restoration')">Photo Restoration</button>
    <button onclick="openJob('Genealogy Research')">Genealogy Research</button>
    <button onclick="openJob('Document Formatting')">Document Formatting</button>
    <button onclick="openJob('Custom Job')">Custom Job</button>
</div>

<div id="job-panel">
    <h2 id="job-title"></h2>

    <label>Upload Files (if needed):</label>
    <input type="file" id="file-input" multiple>

    <label>Optional Notes:</label>
    <textarea id="notes-input" rows="4"></textarea>

    <button id="submit-btn" onclick="submitJob()">Submit Job</button>

    <div id="download-section">
        <h3>Your job is complete.</h3>
        <button onclick="downloadResults()">Download Results</button>
    </div>
</div>

<script>
const BACKEND = "https://tdu-backend-new.tdu-freelance.workers.dev";

let currentJob = "";

function openJob(jobName) {
    currentJob = jobName;
    document.getElementById("job-title").innerText = jobName;
    document.getElementById("job-panel").style.display = "block";
}

async function submitJob() {
    const notes = document.getElementById("notes-input").value;
    const files = document.getElementById("file-input").files;

    const formData = new FormData();
    formData.append("job", currentJob);
    formData.append("notes", notes);

    for (let f of files) {
        formData.append("files", f);
    }

    await fetch(`${BACKEND}/tdu/task/create`, {
        method: "POST",
        body: formData
    });

    document.getElementById("download-section").style.display = "block";
}

async function downloadResults() {
    const res = await fetch(`${BACKEND}/tdu/task/list`);
    const data = await res.json();

    alert("Results retrieved. (In real deployment, this downloads a file.)");
}
</script>

</body>
</html>

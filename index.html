<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TDU · Guided System</title>

<style>
    body {
        background: #050608;
        color: #e8ecf3;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 40px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        letter-spacing: 0.08em;
        color: #9fd3ff;
        margin-bottom: 30px;
    }

    .level {
        margin: 20px auto;
        padding: 20px;
        width: 90%;
        max-width: 500px;
        background: #0b0e14;
        border: 1px solid #1c2230;
        border-radius: 10px;
        display: none;
    }

    .level.active {
        display: block;
    }

    button {
        padding: 12px 20px;
        margin-top: 15px;
        background: #2f7df4;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        cursor: pointer;
    }

    button.secondary {
        background: #151922;
        border: 1px solid #252c3b;
        color: #cfd6e5;
    }

    textarea {
        width: 100%;
        min-height: 80px;
        background: #05070c;
        border: 1px solid #252c3b;
        border-radius: 8px;
        padding: 10px;
        color: #e8ecf3;
        margin-top: 10px;
    }

    .output {
        margin-top: 30px;
        padding: 20px;
        background: #0b0e14;
        border: 1px solid #1c2230;
        border-radius: 10px;
        display: none;
    }
</style>

</head>
<body>

<h1>TDU · GUIDED SYSTEM</h1>

<!-- LEVEL 1 -->
<div id="level1" class="level active">
    <h2>Level 1 · Activation</h2>
    <p>Begin the geometric sequence.</p>
    <button onclick="openLevel(2)">Activate Level 1</button>
</div>

<!-- LEVEL 2 -->
<div id="level2" class="level">
    <h2>Level 2 · Descent</h2>
    <p>The system descends into execution posture.</p>
    <button onclick="openLevel(3)">Proceed to Level 2</button>
</div>

<!-- LEVEL 3 -->
<div id="level3" class="level">
    <h2>Level 3 · Execution</h2>
    <p>Describe the task for backend execution.</p>
    <textarea id="taskInput" placeholder="Describe the task..."></textarea>
    <button onclick="revealOutput()">Execute</button>
</div>

<!-- OUTPUT -->
<div id="output" class="output">
    <h2>Return · Reveal</h2>
    <p id="outputText">The system has executed the task.</p>
    <button class="secondary" onclick="resetSystem()">Reset</button>
</div>

<script>
function openLevel(n) {
    document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
    document.getElementById('level' + n).classList.add('active');
}

function revealOutput() {
    const task = document.getElementById('taskInput').value.trim();
    const out = document.getElementById('output');

    document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));

    document.getElementById('outputText').innerText =
        task ? "Task received: " + task : "Task executed.";

    out.style.display = 'block';
}

function resetSystem() {
    document.getElementById('output').style.display = 'none';
    openLevel(1);
}
</script>

</body>
</html>

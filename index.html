<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TDU Freelance Engine</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0b0c10; color:#e5e5e5; margin:0; padding:2rem; }
    h1 { margin-bottom:0.5rem; }
    .subtitle { color:#9fa4b8; margin-bottom:1.5rem; }
    .grid { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:2rem; }
    button {
      background:#1f2833; color:#e5e5e5; border:1px solid #45a29e;
      padding:0.75rem 1.25rem; border-radius:6px; cursor:pointer; font-size:0.95rem;
    }
    button:hover { background:#45a29e; color:#0b0c10; }
    .output {
      background:#1f2833; border:1px solid #45a29e; border-radius:6px;
      padding:1rem; min-height:150px; white-space:pre-wrap; font-size:0.9rem;
    }
  </style>
</head>
<body>
  <h1>TDU Freelance Engine</h1>
  <div class="subtitle">Run jobs for users: PC Janitor, Email Janitor, Freelance Breakdown.</div>

  <div class="grid">
    <button onclick="runJob('pc_janitor')">Run PC Janitor</button>
    <button onclick="runJob('email_janitor')">Run Email Janitor</button>
    <button onclick="runJob('freelance_breakdown')">Run Freelance Breakdown</button>
  </div>

  <div class="output" id="output">Job output will appear here.</div>

  <script>
   const backendUrl = "https://tdu-freelance-backend.tdu-freelance.workers.dev/run-task";

    async function runJob(jobType) {
      const out = document.getElementById("output");
      out.textContent = `Running ${jobType}...`;

      try {
        const res = await fetch(backendUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ job_type: jobType })
        });

        if (!res.ok) {
          out.textContent = `Error: ${res.status} ${res.statusText}`;
          return;
        }

        const data = await res.json().catch(() => null);
        out.textContent = data ? JSON.stringify(data, null, 2) : "Job completed.";
      } catch (err) {
        out.textContent = `Error: ${err}`;
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>TDU Freelance Portal</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; }
    header { background: #0078ff; color: white; padding: 20px; text-align: center; }
    main { padding: 30px; max-width: 900px; margin: auto; }
    .button, .task {
      display: block; width: 260px; margin: 10px auto; padding: 15px;
      background: #0078ff; color: white; border-radius: 8px;
      text-align: center; cursor: pointer; font-size: 18px;
    }
    .button:hover, .task:hover { background: #005fcc; }
    .section, .tasks, .action {
      display: none; background: white; padding: 25px; border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-top: 20px;
    }
    .back { margin-top: 20px; padding: 10px 15px; background: #0078ff;
      color: white; border-radius: 6px; cursor: pointer; display: inline-block; }
  </style>
</head>

<body>
  <header><h1>TDU Freelance Portal</h1></header>

  <!-- PORTAL -->
  <main id="portal">
    <button class="button" onclick="openOrgan('email')">Email Janitor</button>
    <button class="button" onclick="openOrgan('pc')">PC Janitor</button>
    <button class="button" onclick="openOrgan('file')">File Assistant</button>
    <button class="button" onclick="openOrgan('program')">Program Builder</button>
    <button class="button" onclick="openOrgan('document')">Document Builder</button>
    <button class="button" onclick="openOrgan('resume')">Resume Builder</button>
    <button class="button" onclick="openOrgan('website')">Website Builder</button>
    <button class="button" onclick="openOrgan('data')">Data Entry</button>
    <button class="button" onclick="openOrgan('photo')">Photo Restoration</button>
    <button class="button" onclick="openOrgan('format')">Document Formatting</button>
    <button class="button" onclick="openOrgan('custom')">Custom Job</button>
  </main>

  <!-- ORGAN TEMPLATE -->
  <div id="email" class="section">
    <h2>Email Janitor</h2>
    <div class="task" onclick="openTask('Clean unread emails')">Clean unread emails</div>
    <div class="task" onclick="openTask('Sort inbox into folders')">Sort inbox into folders</div>
    <div class="task" onclick="openTask('Delete junk mail')">Delete junk mail</div>
    <div class="task" onclick="openTask('Archive old messages')">Archive old messages</div>
    <div class="back" onclick="goPortal()">Back</div>
  </div>

  <!-- ACTION SCREEN -->
  <div id="action" class="action">
    <h2 id="actionTitle"></h2>
    <p>This is where the user will perform the job.</p>
    <p>Later you can add uploads, instructions, or backend calls.</p>
    <div class="back" onclick="goPortal()">Back to Portal</div>
  </div>

  <script>
    function openOrgan(id) {
      document.getElementById('portal').style.display = 'none';
      document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }
    function openTask(taskName) {
      document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
      document.getElementById('actionTitle').innerText = taskName;
      document.getElementById('action').style.display = 'block';
    }
    function goPortal() {
      document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
      document.getElementById('action').style.display = 'none';
      document.getElementById('portal').style.display = 'block';
    }
  </script>
</body>
</html>
